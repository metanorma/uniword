name: Tests

on:
  push:
    branches: [ main, feature/autoload-migration ]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.4
          bundler-cache: true

      - name: Install LibreOffice (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libreoffice

      - name: Install LibreOffice (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install --cask libreoffice

      - name: Install dependencies
        run: bundle install

      - name: Run tests
        run: bundle exec rspec --format progress

  test-fast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.4
          bundler-cache: true

      - name: Install dependencies
        run: bundle install

      - name: Run fast tests only (exclude slow integration)
        run: bundle exec rspec --format progress --tag ~slow
