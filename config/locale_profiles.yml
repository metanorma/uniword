# Locale profiles define language-specific settings for DOCX generation.
# Each profile specifies language tags, separators, and East Asian font
# selection based on the user's locale.
#
# Language tags follow BCP 47. The three key language tags are:
# - lang: Primary language (e.g., "en-US")
# - east_asia_lang: East Asian language for themeFontLang (e.g., "zh-CN")
# - bidi_lang: Bidirectional/RTL language for themeFontLang (e.g., "ar-SA")
---
locales:
