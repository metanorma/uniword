# SpreadsheetML Namespace Schema
# ISO 29500-1 Part 4: SpreadsheetML
# URI: http://schemas.openxmlformats.org/spreadsheetml/2006/main
# Prefix: xls
# 
# This schema defines 80+ SpreadsheetML elements for Excel spreadsheet structure,
# formatting, and data management within Word documents.

namespace:
  uri: 'http://schemas.openxmlformats.org/spreadsheetml/2006/main'
  prefix: 'xls'
  description: 'SpreadsheetML - Excel spreadsheet structure and formatting'

elements:
  # Workbook Structure (15 elements)
  
  workbook:
    class_name: Workbook
    description: 'SpreadsheetML workbook root element'
    attributes:
      - name: sheets
        type: Sheets
        xml_name: sheets
        required: true
        description: 'Workbook sheets collection'
      - name: defined_names
        type: DefinedNames
        xml_name: definedNames
        description: 'Named ranges collection'
      - name: calc_pr
        type: CalcProperties
        xml_name: calcPr
        description: 'Calculation properties'
      - name: workbook_pr
        type: WorkbookProperties
        xml_name: workbookPr
        description: 'Workbook properties'
      - name: book_views
        type: BookViews
        xml_name: bookViews
        description: 'Workbook views'
  
  sheets:
    class_name: Sheets
    description: 'Collection of worksheet definitions'
    attributes:
      - name: sheet_entries
        type: Sheet
        collection: true
        xml_name: sheet
        description: 'Individual sheets'
  
  sheet:
    class_name: Sheet
    description: 'Worksheet reference in workbook'
    attributes:
      - name: name
        type: String
        xml_name: name
        xml_attribute: true
        required: true
        description: 'Sheet name'
      - name: sheet_id
        type: Integer
        xml_name: sheetId
        xml_attribute: true
        required: true
        description: 'Sheet numeric identifier'
      - name: id
        type: String
        xml_name: id
        xml_attribute: true
        description: 'Relationship ID'
      - name: state
        type: String
        xml_name: state
        xml_attribute: true
        description: 'Sheet state (visible, hidden, veryHidden)'
  
  definedNames:
    class_name: DefinedNames
    description: 'Named ranges collection'
    attributes:
      - name: names
        type: DefinedName
        collection: true
        xml_name: definedName
        description: 'Individual named ranges'
  
  definedName:
    class_name: DefinedName
    description: 'Named range definition'
    attributes:
      - name: name
        type: String
        xml_name: name
        xml_attribute: true
        required: true
        description: 'Range name'
      - name: comment
        type: String
        xml_name: comment
        xml_attribute: true
        description: 'Comment'
      - name: local_sheet_id
        type: Integer
        xml_name: localSheetId
        xml_attribute: true
        description: 'Local sheet ID'
      - name: hidden
        type: String
        xml_name: hidden
        xml_attribute: true
        description: 'Hidden flag'
  
  calcPr:
    class_name: CalcProperties
    description: 'Calculation properties'
    attributes:
      - name: calc_mode
        type: String
        xml_name: calcMode
        xml_attribute: true
        description: 'Calculation mode (auto, manual, autoNoTable)'
      - name: calc_id
        type: Integer
        xml_name: calcId
        xml_attribute: true
        description: 'Calculation engine ID'
      - name: full_calc_on_load
        type: String
        xml_name: fullCalcOnLoad
        xml_attribute: true
        description: 'Full calculation on load flag'
  
  workbookPr:
    class_name: WorkbookProperties
    description: 'Workbook properties'
    attributes:
      - name: date1904
        type: String
        xml_name: date1904
        xml_attribute: true
        description: '1904 date system flag'
      - name: show_ink_annotation
        type: String
        xml_name: showInkAnnotation
        xml_attribute: true
        description: 'Show ink annotations'
      - name: default_theme_version
        type: Integer
        xml_name: defaultThemeVersion
        xml_attribute: true
        description: 'Default theme version'
  
  bookViews:
    class_name: BookViews
    description: 'Workbook views collection'
    attributes:
      - name: views
        type: WorkbookView
        collection: true
        xml_name: workbookView
        description: 'Individual workbook views'
  
  workbookView:
    class_name: WorkbookView
    description: 'Workbook view settings'
    attributes:
      - name: active_tab
        type: Integer
        xml_name: activeTab
        xml_attribute: true
        description: 'Active tab index'
      - name: window_width
        type: Integer
        xml_name: windowWidth
        xml_attribute: true
        description: 'Window width'
      - name: window_height
        type: Integer
        xml_name: windowHeight
        xml_attribute: true
        description: 'Window height'
  
  fileVersion:
    class_name: FileVersion
    description: 'File version information'
    attributes:
      - name: app_name
        type: String
        xml_name: appName
        xml_attribute: true
        description: 'Application name'
      - name: last_edited
        type: String
        xml_name: lastEdited
        xml_attribute: true
        description: 'Last edited version'
  
  fileSharing:
    class_name: FileSharing
    description: 'File sharing settings'
    attributes:
      - name: read_only_recommended
        type: String
        xml_name: readOnlyRecommended
        xml_attribute: true
        description: 'Read-only recommended flag'
  
  workbookProtection:
    class_name: WorkbookProtection
    description: 'Workbook protection settings'
    attributes:
      - name: lock_structure
        type: String
        xml_name: lockStructure
        xml_attribute: true
        description: 'Lock structure flag'
      - name: lock_windows
        type: String
        xml_name: lockWindows
        xml_attribute: true
        description: 'Lock windows flag'
  
  customWorkbookViews:
    class_name: CustomWorkbookViews
    description: 'Custom workbook views'
    attributes:
      - name: views
        type: String
        collection: true
        xml_name: customWorkbookView
        description: 'Custom views'
  
  pivotCaches:
    class_name: PivotCaches
    description: 'Pivot cache definitions'
    attributes:
      - name: caches
        type: String
        collection: true
        xml_name: pivotCache
        description: 'Pivot caches'
  
  externalReferences:
    class_name: ExternalReferences
    description: 'External references collection'
    attributes:
      - name: refs
        type: String
        collection: true
        xml_name: externalReference
        description: 'External references'

  # Worksheet Structure (20 elements)
  
  worksheet:
    class_name: Worksheet
    description: 'Worksheet root element'
    attributes:
      - name: dimension
        type: Dimension
        xml_name: dimension
        description: 'Sheet dimensions'
      - name: sheet_views
        type: SheetViews
        xml_name: sheetViews
        description: 'Sheet views'
      - name: cols
        type: Cols
        xml_name: cols
        description: 'Column definitions'
      - name: sheet_data
        type: SheetData
        xml_name: sheetData
        required: true
        description: 'Cell data container'
      - name: merge_cells
        type: MergeCells
        xml_name: mergeCells
        description: 'Merged cells collection'
      - name: hyperlinks
        type: Hyperlinks
        xml_name: hyperlinks
        description: 'Hyperlinks collection'
  
  sheetData:
    class_name: SheetData
    description: 'Cell data container'
    attributes:
      - name: rows
        type: Row
        collection: true
        xml_name: row
        description: 'Spreadsheet rows'
  
  row:
    class_name: Row
    description: 'Spreadsheet row'
    attributes:
      - name: r
        type: Integer
        xml_name: r
        xml_attribute: true
        description: 'Row number (1-based)'
      - name: spans
        type: String
        xml_name: spans
        xml_attribute: true
        description: 'Cell span range'
      - name: ht
        type: String
        xml_name: ht
        xml_attribute: true
        description: 'Row height'
      - name: custom_height
        type: String
        xml_name: customHeight
        xml_attribute: true
        description: 'Custom height flag'
      - name: hidden
        type: String
        xml_name: hidden
        xml_attribute: true
        description: 'Hidden row flag'
      - name: cells
        type: Cell
        collection: true
        xml_name: c
        description: 'Row cells'
  
  c:
    class_name: Cell
    description: 'Individual cell'
    attributes:
      - name: r
        type: String
        xml_name: r
        xml_attribute: true
        required: true
        description: 'Cell reference (e.g., A1, B2)'
      - name: s
        type: Integer
        xml_name: s
        xml_attribute: true
        description: 'Style index'
      - name: t
        type: String
        xml_name: t
        xml_attribute: true
        description: 'Cell type (b=boolean, d=date, e=error, inlineStr, n=number, s=string, str=formula)'
      - name: v
        type: CellValue
        xml_name: v
        description: 'Cell value'
      - name: f
        type: CellFormula
        xml_name: f
        description: 'Cell formula'
  
  v:
    class_name: CellValue
    description: 'Cell value element'
    attributes:
      - name: text
        type: String
        xml_content: true
        description: 'Cell value text'
  
  f:
    class_name: CellFormula
    description: 'Cell formula element'
    attributes:
      - name: t
        type: String
        xml_name: t
        xml_attribute: true
        description: 'Formula type (normal, array, dataTable, shared)'
      - name: ref
        type: String
        xml_name: ref
        xml_attribute: true
        description: 'Formula reference range'
      - name: si
        type: Integer
        xml_name: si
        xml_attribute: true
        description: 'Shared formula index'
      - name: text
        type: String
        xml_content: true
        description: 'Formula expression'
  
  dimension:
    class_name: Dimension
    description: 'Sheet dimensions'
    attributes:
      - name: ref
        type: String
        xml_name: ref
        xml_attribute: true
        required: true
        description: 'Dimension range (e.g., A1:Z100)'
  
  sheetViews:
    class_name: SheetViews
    description: 'Sheet views collection'
    attributes:
      - name: views
        type: SheetView
        collection: true
        xml_name: sheetView
        description: 'Individual sheet views'
  
  sheetView:
    class_name: SheetView
    description: 'Sheet view settings'
    attributes:
      - name: workbook_view_id
        type: Integer
        xml_name: workbookViewId
        xml_attribute: true
        required: true
        description: 'Workbook view ID'
      - name: show_grid_lines
        type: String
        xml_name: showGridLines
        xml_attribute: true
        description: 'Show grid lines flag'
      - name: show_row_col_headers
        type: String
        xml_name: showRowColHeaders
        xml_attribute: true
        description: 'Show row/column headers'
      - name: tab_selected
        type: String
        xml_name: tabSelected
        xml_attribute: true
        description: 'Tab selected flag'
      - name: zoom_scale
        type: Integer
        xml_name: zoomScale
        xml_attribute: true
        description: 'Zoom scale percentage'
  
  cols:
    class_name: Cols
    description: 'Column definitions collection'
    attributes:
      - name: col_entries
        type: Col
        collection: true
        xml_name: col
        description: 'Individual column properties'
  
  col:
    class_name: Col
    description: 'Column properties'
    attributes:
      - name: min
        type: Integer
        xml_name: min
        xml_attribute: true
        required: true
        description: 'Minimum column index (1-based)'
      - name: max
        type: Integer
        xml_name: max
        xml_attribute: true
        required: true
        description: 'Maximum column index (1-based)'
      - name: width
        type: String
        xml_name: width
        xml_attribute: true
        description: 'Column width'
      - name: style
        type: Integer
        xml_name: style
        xml_attribute: true
        description: 'Style index'
      - name: hidden
        type: String
        xml_name: hidden
        xml_attribute: true
        description: 'Hidden column flag'
      - name: custom_width
        type: String
        xml_name: customWidth
        xml_attribute: true
        description: 'Custom width flag'
  
  mergeCells:
    class_name: MergeCells
    description: 'Merged cells collection'
    attributes:
      - name: count
        type: Integer
        xml_name: count
        xml_attribute: true
        description: 'Count of merged cells'
      - name: cells
        type: MergeCell
        collection: true
        xml_name: mergeCell
        description: 'Individual merged cells'
  
  mergeCell:
    class_name: MergeCell
    description: 'Merged cell range'
    attributes:
      - name: ref
        type: String
        xml_name: ref
        xml_attribute: true
        required: true
        description: 'Merge range (e.g., A1:B2)'
  
  hyperlinks:
    class_name: Hyperlinks
    description: 'Hyperlinks collection'
    attributes:
      - name: links
        type: Hyperlink
        collection: true
        xml_name: hyperlink
        description: 'Individual hyperlinks'
  
  hyperlink:
    class_name: Hyperlink
    description: 'Hyperlink definition'
    attributes:
      - name: ref
        type: String
        xml_name: ref
        xml_attribute: true
        required: true
        description: 'Cell reference'
      - name: id
        type: String
        xml_name: id
        xml_attribute: true
        description: 'Relationship ID'
      - name: location
        type: String
        xml_name: location
        xml_attribute: true
        description: 'Internal location'
      - name: tooltip
        type: String
        xml_name: tooltip
        xml_attribute: true
        description: 'Tooltip text'
      - name: display
        type: String
        xml_name: display
        xml_attribute: true
        description: 'Display text'
  
  rowBreaks:
    class_name: RowBreaks
    description: 'Row page breaks'
    attributes:
      - name: count
        type: Integer
        xml_name: count
        xml_attribute: true
        description: 'Count of row breaks'
      - name: breaks
        type: String
        collection: true
        xml_name: brk
        description: 'Individual breaks'
  
  colBreaks:
    class_name: ColBreaks
    description: 'Column page breaks'
    attributes:
      - name: count
        type: Integer
        xml_name: count
        xml_attribute: true
        description: 'Count of column breaks'
      - name: breaks
        type: String
        collection: true
        xml_name: brk
        description: 'Individual breaks'
  
  sheetProtection:
    class_name: SheetProtection
    description: 'Sheet protection settings'
    attributes:
      - name: password
        type: String
        xml_name: password
        xml_attribute: true
        description: 'Password hash'
      - name: sheet
        type: String
        xml_name: sheet
        xml_attribute: true
        description: 'Sheet protection flag'
      - name: objects
        type: String
        xml_name: objects
        xml_attribute: true
        description: 'Objects protection flag'
      - name: scenarios
        type: String
        xml_name: scenarios
        xml_attribute: true
        description: 'Scenarios protection flag'
  
  protectedRanges:
    class_name: ProtectedRanges
    description: 'Protected ranges collection'
    attributes:
      - name: ranges
        type: String
        collection: true
        xml_name: protectedRange
        description: 'Individual protected ranges'
  
  scenarios:
    class_name: Scenarios
    description: 'Scenario definitions'
    attributes:
      - name: current
        type: Integer
        xml_name: current
        xml_attribute: true
        description: 'Current scenario index'
      - name: show
        type: Integer
        xml_name: show
        xml_attribute: true
        description: 'Show scenario index'
      - name: entries
        type: String
        collection: true
        xml_name: scenario
        description: 'Individual scenarios'

  # Cell Formatting (15 elements)
  
  cellXfs:
    class_name: CellFormats
    description: 'Cell formats collection'
    attributes:
      - name: count
        type: Integer
        xml_name: count
        xml_attribute: true
        description: 'Count of cell formats'
      - name: formats
        type: CellFormat
        collection: true
        xml_name: xf
        description: 'Individual cell formats'
  
  xf:
    class_name: CellFormat
    description: 'Cell format record'
    attributes:
      - name: num_fmt_id
        type: Integer
        xml_name: numFmtId
        xml_attribute: true
        description: 'Number format ID'
      - name: font_id
        type: Integer
        xml_name: fontId
        xml_attribute: true
        description: 'Font ID'
      - name: fill_id
        type: Integer
        xml_name: fillId
        xml_attribute: true
        description: 'Fill ID'
      - name: border_id
        type: Integer
        xml_name: borderId
        xml_attribute: true
        description: 'Border ID'
      - name: apply_number_format
        type: String
        xml_name: applyNumberFormat
        xml_attribute: true
        description: 'Apply number format flag'
      - name: apply_font
        type: String
        xml_name: applyFont
        xml_attribute: true
        description: 'Apply font flag'
      - name: apply_fill
        type: String
        xml_name: applyFill
        xml_attribute: true
        description: 'Apply fill flag'
      - name: apply_border
        type: String
        xml_name: applyBorder
        xml_attribute: true
        description: 'Apply border flag'
      - name: apply_alignment
        type: String
        xml_name: applyAlignment
        xml_attribute: true
        description: 'Apply alignment flag'
      - name: alignment
        type: Alignment
        xml_name: alignment
        description: 'Cell alignment'
  
  alignment:
    class_name: Alignment
    description: 'Cell alignment properties'
    attributes:
      - name: horizontal
        type: String
        xml_name: horizontal
        xml_attribute: true
        description: 'Horizontal alignment (left, center, right, justify, etc.)'
      - name: vertical
        type: String
        xml_name: vertical
        xml_attribute: true
        description: 'Vertical alignment (top, center, bottom, justify, etc.)'
      - name: text_rotation
        type: Integer
        xml_name: textRotation
        xml_attribute: true
        description: 'Text rotation (0-180)'
      - name: wrap_text
        type: String
        xml_name: wrapText
        xml_attribute: true
        description: 'Wrap text flag'
      - name: indent
        type: Integer
        xml_name: indent
        xml_attribute: true
        description: 'Indent level'
      - name: shrink_to_fit
        type: String
        xml_name: shrinkToFit
        xml_attribute: true
        description: 'Shrink to fit flag'
  
  numFmt:
    class_name: NumberFormat
    description: 'Number format definition'
    attributes:
      - name: num_fmt_id
        type: Integer
        xml_name: numFmtId
        xml_attribute: true
        required: true
        description: 'Format ID'
      - name: format_code
        type: String
        xml_name: formatCode
        xml_attribute: true
        required: true
        description: 'Format code string'
  
  numFmts:
    class_name: NumberFormats
    description: 'Number formats collection'
    attributes:
      - name: count
        type: Integer
        xml_name: count
        xml_attribute: true
        description: 'Count of formats'
      - name: formats
        type: NumberFormat
        collection: true
        xml_name: numFmt
        description: 'Individual number formats'
  
  fonts:
    class_name: Fonts
    description: 'Font collection'
    attributes:
      - name: count
        type: Integer
        xml_name: count
        xml_attribute: true
        description: 'Count of fonts'
      - name: font_entries
        type: Font
        collection: true
        xml_name: font
        description: 'Individual fonts'
  
  font:
    class_name: Font
    description: 'Font definition'
    attributes:
      - name: sz
        type: FontSize
        xml_name: sz
        description: 'Font size'
      - name: name
        type: FontName
        xml_name: name
        description: 'Font name'
      - name: b
        type: Bold
        xml_name: b
        description: 'Bold flag'
      - name: i
        type: Italic
        xml_name: i
        description: 'Italic flag'
      - name: color
        type: Color
        xml_name: color
        description: 'Font color'
  
  sz:
    class_name: FontSize
    description: 'Font size'
    attributes:
      - name: val
        type: String
        xml_name: val
        xml_attribute: true
        required: true
        description: 'Size in points'
  
  name:
    class_name: FontName
    description: 'Font name'
    attributes:
      - name: val
        type: String
        xml_name: val
        xml_attribute: true
        required: true
        description: 'Font name string'
  
  b:
    class_name: Bold
    description: 'Bold formatting'
    attributes:
      - name: val
        type: String
        xml_name: val
        xml_attribute: true
        description: 'Bold value'
  
  i:
    class_name: Italic
    description: 'Italic formatting'
    attributes:
      - name: val
        type: String
        xml_name: val
        xml_attribute: true
        description: 'Italic value'
  
  fills:
    class_name: Fills
    description: 'Fill collection'
    attributes:
      - name: count
        type: Integer
        xml_name: count
        xml_attribute: true
        description: 'Count of fills'
      - name: fill_entries
        type: Fill
        collection: true
        xml_name: fill
        description: 'Individual fills'
  
  fill:
    class_name: Fill
    description: 'Fill definition'
    attributes:
      - name: pattern_fill
        type: PatternFill
        xml_name: patternFill
        description: 'Pattern fill'
  
  patternFill:
    class_name: PatternFill
    description: 'Pattern fill properties'
    attributes:
      - name: pattern_type
        type: String
        xml_name: patternType
        xml_attribute: true
        description: 'Pattern type (none, solid, gray125, etc.)'
      - name: fg_color
        type: Color
        xml_name: fgColor
        description: 'Foreground color'
      - name: bg_color
        type: Color
        xml_name: bgColor
        description: 'Background color'
  
  color:
    class_name: Color
    description: 'Color definition'
    attributes:
      - name: rgb
        type: String
        xml_name: rgb
        xml_attribute: true
        description: 'RGB hex value'
      - name: theme
        type: Integer
        xml_name: theme
        xml_attribute: true
        description: 'Theme color index'
      - name: tint
        type: String
        xml_name: tint
        xml_attribute: true
        description: 'Tint value'
      - name: indexed
        type: Integer
        xml_name: indexed
        xml_attribute: true
        description: 'Indexed color'
  
  borders:
    class_name: Borders
    description: 'Border collection'
    attributes:
      - name: count
        type: Integer
        xml_name: count
        xml_attribute: true
        description: 'Count of borders'
      - name: border_entries
        type: Border
        collection: true
        xml_name: border
        description: 'Individual borders'
  
  border:
    class_name: Border
    description: 'Border definition'
    attributes:
      - name: left
        type: String
        xml_name: left
        description: 'Left border'
      - name: right
        type: String
        xml_name: right
        description: 'Right border'
      - name: top
        type: String
        xml_name: top
        description: 'Top border'
      - name: bottom
        type: String
        xml_name: bottom
        description: 'Bottom border'
      - name: diagonal
        type: String
        xml_name: diagonal
        description: 'Diagonal border'

  # Shared Content (10 elements)
  
  sst:
    class_name: SharedStringTable
    description: 'Shared string table'
    attributes:
      - name: count
        type: Integer
        xml_name: count
        xml_attribute: true
        description: 'Total string references'
      - name: unique_count
        type: Integer
        xml_name: uniqueCount
        xml_attribute: true
        description: 'Unique string count'
      - name: si_entries
        type: StringItem
        collection: true
        xml_name: si
        description: 'String items'
  
  si:
    class_name: StringItem
    description: 'Shared string item'
    attributes:
      - name: t
        type: Text
        xml_name: t
        description: 'Plain text'
      - name: r
        type: RichTextRun
        collection: true
        xml_name: r
        description: 'Rich text runs'
      - name: phonetic_pr
        type: PhoneticProperties
        xml_name: phoneticPr
        description: 'Phonetic properties'
  
  t:
    class_name: Text
    description: 'Text element'
    attributes:
      - name: text
        type: String
        xml_content: true
        description: 'Text content'
      - name: space
        type: String
        xml_name: space
        xml_attribute: true
        description: 'Space preservation (preserve)'
  
  r:
    class_name: RichTextRun
    description: 'Rich text run'
    attributes:
      - name: r_pr
        type: RunProperties
        xml_name: rPr
        description: 'Run properties'
      - name: t
        type: Text
        xml_name: t
        required: true
        description: 'Text element'
  
  rPr:
    class_name: RunProperties
    description: 'Rich text run properties'
    attributes:
      - name: sz
        type: FontSize
        xml_name: sz
        description: 'Font size'
      - name: color
        type: Color
        xml_name: color
        description: 'Text color'
      - name: b
        type: Bold
        xml_name: b
