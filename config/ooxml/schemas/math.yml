# Math Namespace Schema (OMML - Office Math Markup Language)
# ISO 29500-1 Part 1: Math Namespace
# URI: http://schemas.openxmlformats.org/officeDocument/2006/math
# Prefix: m

namespace:
  uri: 'http://schemas.openxmlformats.org/officeDocument/2006/math'
  prefix: 'm'
  description: 'Office Math Markup Language (OMML) - Mathematical equations and formulas'

elements:
  # ============================================================================
  # ROOT ELEMENTS (5)
  # ============================================================================
  
  # Office Math Object
  oMath:
    class_name: OMath
    description: 'Office Math object - container for mathematical expressions'
    attributes:
      - name: elements
        type: String
        collection: true
        xml_name: '*'
        description: 'Math structure elements (fractions, functions, etc.)'
  
  # Office Math Paragraph
  oMathPara:
    class_name: OMathPara
    description: 'Office Math paragraph - block-level math container'
    attributes:
      - name: para_properties
        type: OMathParaProperties
        xml_name: oMathParaPr
        description: 'Paragraph-level math properties'
      - name: math_objects
        type: OMath
        collection: true
        xml_name: oMath
        description: 'Math objects in paragraph'
  
  # Office Math Paragraph Properties
  oMathParaPr:
    class_name: OMathParaProperties
    description: 'Math paragraph properties'
    attributes:
      - name: justification
        type: String
        xml_name: jc
        xml_attribute: val
        description: 'Math paragraph justification (left, center, right)'
  
  # Argument Properties
  argPr:
    class_name: ArgumentProperties
    description: 'Argument properties for math structures'
    attributes:
      - name: arg_size
        type: Integer
        xml_name: argSz
        xml_attribute: val
        description: 'Argument size'
  
  # Control Properties
  ctrlPr:
    class_name: ControlProperties
    description: 'Control properties for math objects'
    attributes:
      - name: run_properties
        type: String
        xml_name: rPr
        description: 'Run properties for control'
  
  # ============================================================================
  # MATHEMATICAL STRUCTURES - FRACTIONS & FUNCTIONS (15)
  # ============================================================================
  
  # Fraction
  f:
    class_name: Fraction
    description: 'Mathematical fraction'
    attributes:
      - name: properties
        type: FractionProperties
        xml_name: fPr
        description: 'Fraction properties'
      - name: numerator
        type: Numerator
        xml_name: num
        required: true
        description: 'Fraction numerator'
      - name: denominator
        type: Denominator
        xml_name: den
        required: true
        description: 'Fraction denominator'
  
  # Fraction Properties
  fPr:
    class_name: FractionProperties
    description: 'Fraction formatting properties'
    attributes:
      - name: type
        type: String
        xml_name: type
        xml_attribute: val
        description: 'Fraction type (bar, skw, lin, noBar)'
      - name: ctrl_pr
        type: ControlProperties
        xml_name: ctrlPr
        description: 'Control properties'
  
  # Numerator
  num:
    class_name: Numerator
    description: 'Fraction numerator'
    attributes:
      - name: arg_properties
        type: ArgumentProperties
        xml_name: argPr
        description: 'Argument properties'
      - name: elements
        type: String
        collection: true
        xml_name: '*'
        description: 'Numerator content'
  
  # Denominator
  den:
    class_name: Denominator
    description: 'Fraction denominator'
    attributes:
      - name: arg_properties
        type: ArgumentProperties
        xml_name: argPr
        description: 'Argument properties'
      - name: elements
        type: String
        collection: true
        xml_name: '*'
        description: 'Denominator content'
  
  # Function
  func:
    class_name: Function
    description: 'Mathematical function (sin, cos, log, etc.)'
    attributes:
      - name: properties
        type: FunctionProperties
        xml_name: funcPr
        description: 'Function properties'
      - name: function_name
        type: FunctionName
        xml_name: fName
        required: true
        description: 'Function name'
      - name: element
        type: Element
        xml_name: e
        required: true
        description: 'Function argument'
  
  # Function Properties
  funcPr:
    class_name: FunctionProperties
    description: 'Function formatting properties'
    attributes:
      - name: ctrl_pr
        type: ControlProperties
        xml_name: ctrlPr
        description: 'Control properties'
  
  # Function Name
  fName:
    class_name: FunctionName
    description: 'Function name (e.g., sin, cos, log)'
    attributes:
      - name: arg_properties
        type: ArgumentProperties
        xml_name: argPr
        description: 'Argument properties'
      - name: elements
        type: String
        collection: true
        xml_name: '*'
        description: 'Function name content'
  
  # Element/Base
  e:
    class_name: Element
    description: 'Base element for math structures'
    attributes:
      - name: arg_properties
        type: ArgumentProperties
        xml_name: argPr
        description: 'Argument properties'
      - name: elements
        type: String
        collection: true
        xml_name: '*'
        description: 'Element content'
  
  # ============================================================================
  # DELIMITERS & ARRAYS (10)
  # ============================================================================
  
  # Delimiter
  d:
    class_name: Delimiter
    description: 'Delimiter object (parentheses, brackets, braces)'
    attributes:
      - name: properties
        type: DelimiterProperties
        xml_name: dPr
        description: 'Delimiter properties'
      - name: elements
        type: Element
        collection: true
        xml_name: e
        description: 'Delimited elements'
  
  # Delimiter Properties
  dPr:
    class_name: DelimiterProperties
    description: 'Delimiter formatting properties'
    attributes:
      - name: begin_char
        type: BeginChar
        xml_name: begChr
        description: 'Beginning delimiter character'
      - name: end_char
        type: EndChar
        xml_name: endChr
        description: 'Ending delimiter character'
      - name: separator_char
        type: SeparatorChar
        xml_name: sepChr
        description: 'Separator character'
      - name: grow
        type: String
        xml_name: grow
        xml_attribute: val
        description: 'Grow delimiters to content'
      - name: shape
        type: String
        xml_name: shp
        xml_attribute: val
        description: 'Delimiter shape (centered, match)'
      - name: ctrl_pr
        type: ControlProperties
        xml_name: ctrlPr
        description: 'Control properties'
  
  # Begin Character
  begChr:
    class_name: BeginChar
    description: 'Beginning delimiter character'
    attributes:
      - name: val
        type: String
        xml_name: val
        xml_attribute: true
        description: 'Character value'
  
  # End Character
  endChr:
    class_name: EndChar
    description: 'Ending delimiter character'
    attributes:
      - name: val
        type: String
        xml_name: val
        xml_attribute: true
        description: 'Character value'
  
  # Separator Character
  sepChr:
    class_name: SeparatorChar
    description: 'Separator delimiter character'
    attributes:
      - name: val
        type: String
        xml_name: val
        xml_attribute: true
        description: 'Character value'
  
  # Equation Array
  eqArr:
    class_name: EquationArray
    description: 'Equation array (system of equations)'
    attributes:
      - name: properties
        type: EquationArrayProperties
        xml_name: eqArrPr
        description: 'Equation array properties'
      - name: elements
        type: Element
        collection: true
        xml_name: e
        description: 'Array elements'
  
  # Equation Array Properties
  eqArrPr:
    class_name: EquationArrayProperties
    description: 'Equation array formatting properties'
    attributes:
      - name: base_jc
        type: String
        xml_name: baseJc
        xml_attribute: val
        description: 'Baseline justification (top, center, bottom)'
      - name: max_dist
        type: String
        xml_name: maxDist
        xml_attribute: val
        description: 'Maximum distribution'
      - name: obj_dist
        type: String
        xml_name: objDist
        xml_attribute: val
        description: 'Object distribution'
      - name: row_spacing_rule
        type: Integer
        xml_name: rSpRule
        xml_attribute: val
        description: 'Row spacing rule'
      - name: row_spacing
        type: Integer
        xml_name: rSp
        xml_attribute: val
        description: 'Row spacing'
      - name: ctrl_pr
        type: ControlProperties
        xml_name: ctrlPr
        description: 'Control properties'
  
  # ============================================================================
  # MATRICES (7)
  # ============================================================================
  
  # Matrix
  m:
    class_name: Matrix
    description: 'Mathematical matrix'
    attributes:
      - name: properties
        type: MatrixProperties
        xml_name: mPr
        description: 'Matrix properties'
      - name: rows
        type: MatrixRow
        collection: true
        xml_name: mr
        description: 'Matrix rows'
  
  # Matrix Properties
  mPr:
    class_name: MatrixProperties
    description: 'Matrix formatting properties'
    attributes:
      - name: base_jc
        type: String
        xml_name: baseJc
        xml_attribute: val
        description: 'Baseline justification'
      - name: plc_hide
        type: String
        xml_name: plcHide
        xml_attribute: val
        description: 'Hide placeholders'
      - name: row_spacing_rule
        type: Integer
        xml_name: rSpRule
        xml_attribute: val
        description: 'Row spacing rule'
      - name: row_spacing
        type: Integer
        xml_name: rSp
        xml_attribute: val
        description: 'Row spacing'
      - name: column_gap_rule
        type: Integer
        xml_name: cGpRule
        xml_attribute: val
        description: 'Column gap rule'
      - name: column_gap
        type: Integer
        xml_name: cGp
        xml_attribute: val
        description: 'Column gap'
      - name: matrix_columns
        type: MatrixColumns
        xml_name: mcs
        description: 'Matrix column properties'
      - name: ctrl_pr
        type: ControlProperties
        xml_name: ctrlPr
        description: 'Control properties'
  
  # Matrix Row
  mr:
    class_name: MatrixRow
    description: 'Matrix row'
    attributes:
      - name: elements
        type: Element
        collection: true
        xml_name: e
        description: 'Row elements'
  
  # Matrix Columns
  mcs:
    class_name: MatrixColumns
    description: 'Matrix column properties'
    attributes:
      - name: columns
        type: MatrixColumn
        collection: true
        xml_name: mc
        description: 'Individual column properties'
  
  # Matrix Column
  mc:
    class_name: MatrixColumn
    description: 'Matrix column properties'
    attributes:
      - name: column_properties
        type: MatrixColumnProperties
        xml_name: mcPr
        description: 'Column properties'
  
  # Matrix Column Properties
  mcPr:
    class_name: MatrixColumnProperties
    description: 'Matrix column formatting properties'
    attributes:
      - name: count
        type: Integer
        xml_name: count
        xml_attribute: val
        description: 'Column span count'
      - name: column_jc
        type: String
        xml_name: mcJc
        xml_attribute: val
        description: 'Column justification'
  
  # ============================================================================
  # SCRIPTS & RADICALS - SUBSCRIPTS & SUPERSCRIPTS (12)
  # ============================================================================
  
  # Subscript
  sSub:
    class_name: Subscript
    description: 'Subscript object'
    attributes:
      - name: properties
        type: SubscriptProperties
        xml_name: sSubPr
        description: 'Subscript properties'
      - name: element
        type: Element
        xml_name: e
        required: true
        description: 'Base element'
      - name: sub
        type: Sub
        xml_name: sub
        required: true
        description: 'Subscript'
  
  # Subscript Properties
  sSubPr:
    class_name: SubscriptProperties
    description: 'Subscript formatting properties'
    attributes:
      - name: ctrl_pr
        type: ControlProperties
        xml_name: ctrlPr
        description: 'Control properties'
  
  # Subscript Element
  sub:
    class_name: Sub
    description: 'Subscript content'
    attributes:
      - name: arg_properties
        type: ArgumentProperties
        xml_name: argPr
        description: 'Argument properties'
      - name: elements
        type: String
        collection: true
        xml_name: '*'
        description: 'Subscript content'
  
  # Superscript
  sSup:
    class_name: Superscript
    description: 'Superscript object'
    attributes:
      - name: properties
        type: SuperscriptProperties
        xml_name: sSupPr
        description: 'Superscript properties'
      - name: element
        type: Element
        xml_name: e
        required: true
        description: 'Base element'
      - name: sup
        type: Sup
        xml_name: sup
        required: true
        description: 'Superscript'
  
  # Superscript Properties
  sSupPr:
    class_name: SuperscriptProperties
    description: 'Superscript formatting properties'
    attributes:
      - name: ctrl_pr
        type: ControlProperties
        xml_name: ctrlPr
        description: 'Control properties'
  
  # Superscript Element
  sup:
    class_name: Sup
    description: 'Superscript content'
    attributes:
      - name: arg_properties
        type: ArgumentProperties
        xml_name: argPr
        description: 'Argument properties'
      - name: elements
        type: String
        collection: true
        xml_name: '*'
        description: 'Superscript content'
  
  # Pre-Sub-Superscript
  sPre:
    class_name: PreSubSuperscript
    description: 'Pre-subscript and superscript object'
    attributes:
      - name: properties
        type: PreSubSuperscriptProperties
        xml_name: sPrePr
        description: 'Pre-sub-superscript properties'
      - name: sub
        type: Sub
        xml_name: sub
        required: true
        description: 'Pre-subscript'
      - name: sup
        type: Sup
        xml_name: sup
        required: true
        description: 'Pre-superscript'
      - name: element
        type: Element
        xml_name: e
        required: true
        description: 'Base element'
  
  # Pre-Sub-Superscript Properties
  sPrePr:
    class_name: PreSubSuperscriptProperties
    description: 'Pre-sub-superscript formatting properties'
    attributes:
      - name: ctrl_pr
        type: ControlProperties
        xml_name: ctrlPr
        description: 'Control properties'
  
  # Sub-Superscript
  sSubSup:
    class_name: SubSuperscript
    description: 'Subscript and superscript object'
    attributes:
      - name: properties
        type: SubSuperscriptProperties
        xml_name: sSubSupPr
        description: 'Sub-superscript properties'
      - name: element
        type: Element
        xml_name: e
        required: true
        description: 'Base element'
      - name: sub
        type: Sub
        xml_name: sub
        required: true
        description: 'Subscript'
      - name: sup
        type: Sup
        xml_name: sup
        required: true
        description: 'Superscript'
  
  # Sub-Superscript Properties
  sSubSupPr:
    class_name: SubSuperscriptProperties
    description: 'Sub-superscript formatting properties'
    attributes:
      - name: aln_scr
        type: String
        xml_name: alnScr
        xml_attribute: val
        description: 'Align scripts'
      - name: ctrl_pr
        type: ControlProperties
        xml_name: ctrlPr
        description: 'Control properties'
  
  # ============================================================================
  # RADICALS & LIMITS (10)
  # ============================================================================
  
  # Radical
  rad:
    class_name: Radical
    description: 'Radical object (square root, nth root)'
    attributes:
      - name: properties
        type: RadicalProperties
        xml_name: radPr
        description: 'Radical properties'
      - name: degree
        type: Degree
        xml_name: deg
        description: 'Radical degree (for nth root)'
      - name: element
        type: Element
        xml_name: e
        required: true
        description: 'Radicand'
  
  # Radical Properties
  radPr:
    class_name: RadicalProperties
    description: 'Radical formatting properties'
    attributes:
      - name: deg_hide
        type: String
        xml_name: degHide
        xml_attribute: val
        description: 'Hide degree'
      - name: ctrl_pr
        type: ControlProperties
        xml_name: ctrlPr
        description: 'Control properties'
  
  # Degree
  deg:
    class_name: Degree
    description: 'Radical degree'
    attributes:
      - name: arg_properties
        type: ArgumentProperties
        xml_name: argPr
        description: 'Argument properties'
      - name: elements
        type: String
        collection: true
        xml_name: '*'
        description: 'Degree content'
  
  # Lower Limit
  limLow:
    class_name: LowerLimit
    description: 'Lower limit object'
    attributes:
      - name: properties
        type: LowerLimitProperties
        xml_name: limLowPr
        description: 'Lower limit properties'
      - name: element
        type: Element
        xml_name: e
        required: true
        description: 'Base element'
      - name: lim
        type: Lim
        xml_name: lim
        required: true
        description: 'Lower limit'
  
  # Lower Limit Properties
  limLowPr:
    class_name: LowerLimitProperties
    description: 'Lower limit formatting properties'
    attributes:
      - name: ctrl_pr
        type: ControlProperties
        xml_name: ctrlPr
        description: 'Control properties'
  
  # Upper Limit
  limUpp:
    class_name: UpperLimit
    description: 'Upper limit object'
    attributes:
      - name: properties
        type: UpperLimitProperties
        xml_name: limUppPr
        description: 'Upper limit properties'
      - name: element
        type: Element
        xml_name: e
        required: true
        description: 'Base element'
      - name: lim
        type: Lim
        xml_name: lim
        required: true
        description: 'Upper limit'
  
  # Upper Limit Properties
  limUppPr:
    class_name: UpperLimitProperties
    description: 'Upper limit formatting properties'
    attributes:
      - name: ctrl_pr
        type: ControlProperties
        xml_name: ctrlPr
        description: 'Control properties'
  
  # Limit
  lim:
    class_name: Lim
    description: 'Limit content'
    attributes:
      - name: arg_properties
        type: ArgumentProperties
        xml_name: argPr
        description: 'Argument properties'
      - name: elements
        type: String
        collection: true
        xml_name: '*'
        description: 'Limit content'
  
  # ============================================================================
  # GROUPING & ACCENTS (8)
  # ============================================================================
  
  # Group Character
  groupChr:
    class_name: GroupChar
    description: 'Group character object (overbrace, underbrace)'
    attributes:
      - name: properties
        type: GroupCharProperties
        xml_name: groupChrPr
        description: 'Group character properties'
      - name: element
        type: Element
        xml_name: e
        required: true
        description: 'Grouped element'
  
  # Group Character Properties
  groupChrPr:
    class_name: GroupCharProperties
    description: 'Group character formatting properties'
    attributes:
      - name: chr
        type: Char
        xml_name: chr
        description: 'Grouping character'
      - name: pos
        type: String
        xml_name: pos
        xml_attribute: val
        description: 'Position (top, bottom)'
      - name: vert_jc
        type: String
        xml_name: vertJc
        xml_attribute: val
        description: 'Vertical justification'
      - name: ctrl_pr
        type: ControlProperties
        xml_name: ctrlPr
        description: 'Control properties'
  
  # Accent
  acc:
    class_name: Accent
    description: 'Accent object (hat, tilde, bar)'
    attributes:
      - name: properties
        type: AccentProperties
        xml_name: accPr
        description: 'Accent properties'
      - name: element
        type: Element
        xml_name: e
        required: true
        description: 'Base element'
  
  # Accent Properties
  accPr:
    class_name: AccentProperties
    description: 'Accent formatting properties'
    attributes:
      - name: chr
        type: Char
        xml_name: chr
        description: 'Accent character'
      - name: ctrl_pr
        type: ControlProperties
        xml_name: ctrlPr
        description: 'Control properties'
  
  # Character
  chr:
    class_name: Char
    description: 'Character specification'
    attributes:
      - name: val
        type: String
        xml_name: val
        xml_attribute: true
        required: true
        description: 'Character value'
  
  # ============================================================================
  # N-ARY OPERATORS (7)
  # ============================================================================
  
  # N-ary Operator
  nary:
    class_name: Nary
    description: 'N-ary operator (sum, integral, product)'
    attributes:
      - name: properties
        type: NaryProperties
        xml_name: naryPr
        description: 'N-ary properties'
      - name: sub
        type: Sub
        xml_name: sub
        description: 'Lower limit'
      - name: sup
        type: Sup
        xml_name: sup
        description: 'Upper limit'
      - name: element
        type: Element
        xml_name: e
        required: true
        description: 'Integrand/summand'
  
  # N-ary Properties
  naryPr:
    class_name: NaryProperties
    description: 'N-ary operator formatting properties'
    attributes:
      - name: chr
        type: Char
        xml_name: chr
        description: 'N-ary character'
      - name: lim_loc
        type: String
        xml_name: limLoc
        xml_attribute: val
        description: 'Limit location (undOvr, subSup)'
      - name: grow
        type: String
        xml_name: grow
        xml_attribute: val
        description: 'Grow to content'
      - name: sub_hide
        type: String
        xml_name: subHide
        xml_attribute: val
        description: 'Hide subscript'
      - name: sup_hide
        type: String
        xml_name: supHide
        xml_attribute: val
        description: 'Hide superscript'
      - name: ctrl_pr
        type: ControlProperties
        xml_name: ctrlPr
        description: 'Control properties'
  
  # ============================================================================
  # CONTENT ELEMENTS - TEXT & RUNS (8)
  # ============================================================================
  
  # Math Run
  r:
    class_name: MathRun
    description: 'Math run - text with formatting'
    attributes:
      - name: properties
        type: MathRunProperties
        xml_name: rPr
        description: 'Run properties'
      - name: text
        type: String
        xml_name: t
        description: 'Run text'
  
  # Math Run Properties
  rPr:
    class_name: MathRunProperties
    description: 'Math run formatting properties'
    attributes:
      - name: lit
        type: String
        xml_name: lit
        xml_attribute: val
        description: 'Literal (no equation building)'
      - name: nor
        type: String
        xml_name: nor
        xml_attribute: val
        description: 'Normal text (not italicized)'
      - name: scr
        type: String
        xml_name: scr
        xml_attribute: val
        description: 'Script level (roman, script, sans-serif, etc.)'
      - name: sty
        type: String
        xml_name: sty
        xml_attribute: val
        description: 'Style (p, b, i, bi)'
      - name: brk
        type: MathBreak
        xml_name: brk
        description: 'Break'
      - name: aln
        type: String
        xml_name: aln
        xml_attribute: val
        description: 'Alignment'
  
  # Math Text
  t:
    class_name: MathText
    description: 'Math text content'
    attributes:
      - name: value
        type: String
        xml_name: value
        description: 'Text value'
  
  # Break
  brk:
    class_name: MathBreak
    description: 'Break in math equation'
    attributes:
      - name: aln_at
        type: Integer
        xml_name: alnAt
        xml_attribute: val
        description: 'Alignment at'
  
  # ============================================================================
  # LAYOUT & BOXES (6)
  # ============================================================================
  
  # Box
  box:
    class_name: Box
    description: 'Box object (rectangular container)'
    attributes:
      - name: properties
        type: BoxProperties
        xml_name: boxPr
        description: 'Box properties'
      - name: element
        type: Element
        xml_name: e
        required: true
        description: 'Boxed element'
  
  # Box Properties
  boxPr:
    class_name: BoxProperties
    description: 'Box formatting properties'
    attributes:
      - name: opEmu
        type: String
        xml_name: opEmu
        xml_attribute: val
        description: 'Operator emulation'
      - name: no_break
        type: String
        xml_name: noBreak
        xml_attribute: val
        description: 'No break'
      - name: diff
        type: String
        xml_name: diff
        xml_attribute: val
        description: 'Differential'
      - name: brk
        type: MathBreak
        xml_name: brk
        description: 'Break'
      - name: aln
        type: String
        xml_name: aln
        xml_attribute: val
        description: 'Alignment'
      - name: ctrl_pr
        type: ControlProperties
        xml_name: ctrlPr
        description: 'Control properties'
  
  # Bar
  bar:
    class_name: Bar
    description: 'Bar object (overbar, underbar)'
    attributes:
      - name: properties
        type: BarProperties
        xml_name: barPr
        description: 'Bar properties'
      - name: element
        type: Element
        xml_name: e
        required: true
        description: 'Base element'
  
  # Bar Properties
  barPr:
    class_name: BarProperties
    description: 'Bar formatting properties'
    attributes:
      - name: pos
        type: String
        xml_name: pos
        xml_attribute: val
        description: 'Bar position (top, bottom)'
      - name: ctrl_pr
        type: ControlProperties
        xml_name: ctrlPr
        description: 'Control properties'
  
  # Border Box
  borderBox:
    class_name: BorderBox
    description: 'Border box object'
    attributes:
      - name: properties
        type: BorderBoxProperties
