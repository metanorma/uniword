        optional: true
      - element: v
        tag: 'c:v'
        optional: true
    attributes: []

  # Categories
  cat:
    tag: 'c:cat'
    description: "Category axis data"
    iso_reference: "21.2.2.24"
    children:
      - element: num_ref
        tag: 'c:numRef'
        optional: true
      - element: num_lit
        tag: 'c:numLit'
        optional: true
      - element: str_ref
        tag: 'c:strRef'
        optional: true
      - element: str_lit
        tag: 'c:strLit'
        optional: true
      - element: multi_lvl_str_ref
        tag: 'c:multiLvlStrRef'
        optional: true
    attributes: []

  # Values
  val:
    tag: 'c:val'
    description: "Values"
    iso_reference: "21.2.2.225"
    children:
      - element: num_ref
        tag: 'c:numRef'
        optional: true
      - element: num_lit
        tag: 'c:numLit'
        optional: true
    attributes: []

  # Number reference
  num_ref:
    tag: 'c:numRef'
    description: "Number reference (references cells in worksheet)"
    iso_reference: "21.2.2.115"
    children:
      - element: f
        tag: 'c:f'
        optional: false
      - element: num_cache
        tag: 'c:numCache'
