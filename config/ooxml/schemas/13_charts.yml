      - element: ax_pos
        tag: 'c:axPos'
        optional: false
      - element: major_gridlines
        tag: 'c:majorGridlines'
        optional: true
      - element: minor_gridlines
        tag: 'c:minorGridlines'
        optional: true
      - element: title
        tag: 'c:title'
        optional: true
      - element: num_fmt
        tag: 'c:numFmt'
        optional: true
      - element: major_tick_mark
        tag: 'c:majorTickMark'
        optional: true
      - element: minor_tick_mark
        tag: 'c:minorTickMark'
        optional: true
      - element: tick_lbl_pos
        tag: 'c:tickLblPos'
        optional: true
      - element: sp_pr
        tag: 'c:spPr'
        optional: true
      - element: tx_pr
        tag: 'c:txPr'
        optional: true
      - element: crosses_at
        tag: 'c:crossesAt'
        optional: true
      - element: crosses
        tag: 'c:crosses'
        optional: true
      - element: auto
        tag: 'c:auto'
        optional: true
      - element: lbl_algn
