        tag: 'c:grouping'
        optional: true
      - element: vary_colors
        tag: 'c:varyColors'
        optional: true
      - element: ser
        tag: 'c:ser'
        optional: false
      - element: d_lbls
        tag: 'c:dLbls'
        optional: true
      - element: drop_lines
        tag: 'c:dropLines'
        optional: true
      - element: ax_id
        tag: 'c:axId'
        optional: false
    attributes: []

  # Series
  ser:
    tag: 'c:ser'
    description: "Chart series (data series)"
    iso_reference: "21.2.2.168"
    children:
      - element: idx
        tag: 'c:idx'
        optional: false
      - element: order
        tag: 'c:order'
        optional: false
      - element: tx
        tag: 'c:tx'
        optional: true
      - element: sp_pr
        tag: 'c:spPr'
        optional: true
      - element: marker
        tag: 'c:marker'
        optional: true
      - element: d_pt
        tag: 'c:dPt'
        optional: true
      - element: d_lbls
        tag: 'c:dLbls'
        optional: true
      - element: trendline
        tag: 'c:trendline'
        optional: true
      - element: err_bars
