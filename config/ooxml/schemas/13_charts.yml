# Chart Schema
# ISO/IEC 29500-1:2016 - Section 21.2 (DrawingML - Charts)
# Chart and diagram elements

schema:
  namespace: c
  category: "Charts"
  iso_section: "21.2"

elements:
  # Chart space (root element)
  chart_space:
    tag: 'c:chartSpace'
    description: "Root element for chart part"
    iso_reference: "21.2.2.27"
    children:
      - element: date1904
        tag: 'c:date1904'
        optional: true
      - element: lang
        tag: 'c:lang'
        optional: true
      - element: rounding_mode
        tag: 'c:roundedCorners'
        optional: true
      - element: chart
        tag: 'c:chart'
        optional: false
      - element: sp_pr
        tag: 'c:spPr'
        optional: true
      - element: tx_pr
        tag: 'c:txPr'
        optional: true
      - element: external_data
        tag: 'c:externalData'
        optional: true
      - element: print_settings
        tag: 'c:printSettings'
        optional: true
    attributes: []

  # Chart container
  chart:
    tag: 'c:chart'
    description: "Main chart container"
    iso_reference: "21.2.2.25"
    children:
      - element: title
        tag: 'c:title'
        optional: true
      - element: auto_title_deleted
        tag: 'c:autoTitleDeleted'
        optional: true
      - element: plot_area
        tag: 'c:plotArea'
        optional: false
      - element: legend
        tag: 'c:legend'
        optional: true
      - element: plot_vis_only
        tag: 'c:plotVisOnly'
        optional: true
      - element: disp_blanks_as
        tag: 'c:dispBlanksAs'
        optional: true
      - element: show_dlbls_over_max
        tag: 'c:showDLblsOverMax'
        optional: true
    attributes: []

  # Plot area
  plot_area:
    tag: 'c:plotArea'
    description: "Chart plotting area"
    iso_reference: "21.2.2.145"
    children:
      - element: layout
        tag: 'c:layout'
        optional: true
      - element: bar_chart
        tag: 'c:barChart'
        optional: true
      - element: bar3d_chart
        tag: 'c:bar3DChart'
        optional: true
      - element: line_chart
        tag: 'c:lineChart'
        optional: true
      - element: line3d_chart
        tag: 'c:line3DChart'
        optional: true
      - element: pie_chart
        tag: 'c:pieChart'
        optional: true
      - element: pie3d_chart
        tag: 'c:pie3DChart'
        optional: true
      - element: area_chart
        tag: 'c:areaChart'
        optional: true
      - element: area3d_chart
        tag: 'c:area3DChart'
        optional: true
      - element: scatter_chart
        tag: 'c:scatterChart'
        optional: true
      - element: radar_chart
        tag: 'c:radarChart'
        optional: true
      - element: doughnut_chart
        tag: 'c:doughnutChart'
        optional: true
      - element: bubble_chart
        tag: 'c:bubbleChart'
        optional: true
      - element: stock_chart
        tag: 'c:stockChart'
        optional: true
      - element: surface_chart
        tag: 'c:surfaceChart'
        optional: true
      - element: surface3d_chart
        tag: 'c:surface3DChart'
        optional: true
      - element: cat_ax
        tag: 'c:catAx'
        optional: true
      - element: val_ax
        tag: 'c:valAx'
        optional: true
      - element: date_ax
        tag: 'c:dateAx'
        optional: true
      - element: ser_ax
        tag: 'c:serAx'
        optional: true
      - element: sp_pr
        tag: 'c:spPr'
        optional: true
    attributes: []

  # Bar chart
  bar_chart:
    tag: 'c:barChart'
    description: "Bar chart definition"
    iso_reference: "21.2.2.16"
    children:
      - element: bar_dir
        tag: 'c:barDir'
        optional: false
      - element: grouping
        tag: 'c:grouping'
        optional: true
      - element: vary_colors
        tag: 'c:varyColors'
        optional: true
      - element: ser
        tag: 'c:ser'
        optional: false
      - element: d_lbls
        tag: 'c:dLbls'
        optional: true
      - element: gap_width
        tag: 'c:gapWidth'
        optional: true
      - element: overlap
        tag: 'c:overlap'
        optional: true
      - element: ax_id
        tag: 'c:axId'
        optional: false
    attributes: []

  # Line chart
  line_chart:
    tag: 'c:lineChart'
    description: "Line chart definition"
    iso_reference: "21.2.2.97"
    children:
      - element: grouping
        tag: 'c:grouping'
        optional: true
      - element: vary_colors
        tag: 'c:varyColors'
        optional: true
      - element: ser
