        optional: true
      - element: drop_lines
        tag: 'c:dropLines'
        optional: true
      - element: hi_low_lines
        tag: 'c:hiLowLines'
        optional: true
      - element: up_down_bars
        tag: 'c:upDownBars'
        optional: true
      - element: marker
        tag: 'c:marker'
        optional: true
      - element: smooth
        tag: 'c:smooth'
        optional: true
      - element: ax_id
        tag: 'c:axId'
        optional: false
    attributes: []

  # Pie chart
  pie_chart:
    tag: 'c:pieChart'
    description: "Pie chart definition"
    iso_reference: "21.2.2.126"
    children:
      - element: vary_colors
        tag: 'c:varyColors'
        optional: true
      - element: ser
        tag: 'c:ser'
        optional: false
      - element: d_lbls
        tag: 'c:dLbls'
        optional: true
      - element: first_slice_ang
        tag: 'c:firstSliceAng'
        optional: true
    attributes: []

  # Scatter chart
  scatter_chart:
    tag: 'c:scatterChart'
    description: "Scatter (XY) chart definition"
    iso_reference: "21.2.2.166"
    children:
      - element: scatter_style
        tag: 'c:scatterStyle'
        optional: false
      - element: vary_colors
        tag: 'c:varyColors'
        optional: true
      - element: ser
        tag: 'c:ser'
        optional: false
      - element: d_lbls
        tag: 'c:dLbls'
        optional: true
      - element: ax_id
        tag: 'c:axId'
        optional: false
    attributes: []

  # Area chart
  area_chart:
