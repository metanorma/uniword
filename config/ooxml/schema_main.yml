# OOXML WordProcessingML Main Namespace Schema
# ISO/IEC 29500-1:2016 - Word Processing Markup Language
#
# This schema defines the structure of ALL elements in the main
# WordProcessingML namespace (w:). Configuration-driven approach
# allows modification without code changes.

schema:
  version: "ISO/IEC 29500-1:2016"
  namespace:
    prefix: 'w'
    uri: 'http://schemas.openxmlformats.org/wordprocessingml/2006/main'

# Core document structure elements
elements:
  document:
    tag: 'w:document'
    description: "Root element of document.xml"
    children:
      - element: body
        required: true
        multiple: false
    attributes: []

  body:
    tag: 'w:body'
    description: "Document body containing all content"
    children:
      - element: paragraph
        multiple: true
        optional: true
      - element: table
        multiple: true
        optional: true
      - element: section_properties
        tag: 'w:sectPr'
        optional: true
        multiple: false
    attributes: []

  # Paragraph element with full schema
  paragraph:
    tag: 'w:p'
    description: "Paragraph - block-level text container"
    children:
      - element: paragraph_properties
        tag: 'w:pPr'
        optional: true
      - element: run
        tag: 'w:r'
        multiple: true
        optional: true
      - element: hyperlink
        tag: 'w:hyperlink'
        multiple: true
        optional: true
      - element: bookmark_start
        tag: 'w:bookmarkStart'
        multiple: true
        optional: true
      - element: bookmark_end
        tag: 'w:bookmarkEnd'
        multiple: true
        optional: true
      - element: comment_range_start
        tag: 'w:commentRangeStart'
        multiple: true
        optional: true
      - element: comment_range_end
        tag: 'w:commentRangeEnd'
        multiple: true
        optional: true
      - element: field_char
        tag: 'w:fldChar'
        multiple: true
        optional: true
      - element: instr_text
        tag: 'w:instrText'
        multiple: true
        optional: true
    attributes: []

  # Paragraph properties with complete attribute list
  paragraphproperties:
    tag: 'w:pPr'
    description: "Paragraph formatting properties"
    children:
      - element: style
        tag: 'w:pStyle'
        optional: true
        attributes:
          - name: val
            type: string
            required: true
      - element: alignment
        tag: 'w:jc'
        optional: true
        attributes:
          - name: val
            type: enum
            values: [left, right, center, both, distribute]
            required: true
      - element: spacing
        tag: 'w:spacing'
        optional: true
        attributes:
          - name: before
            type: integer
          - name: after
            type: integer
          - name: line
            type: integer
          - name: lineRule
            type: enum
            values: [auto, exact, atLeast]
      - element: indentation
        tag: 'w:ind'
        optional: true
        attributes:
          - name: left
            type: integer
          - name: right
            type: integer
          - name: firstLine
            type: integer
          - name: hanging
            type: integer
      - element: numbering
        tag: 'w:numPr'
        optional: true
        children:
          - element: ilvl
            tag: 'w:ilvl'
            attributes:
              - name: val
                type: integer
                required: true
          - element: numId
            tag: 'w:numId'
            attributes:
              - name: val
                type: integer
                required: true
      - element: keep_next
        tag: 'w:keepNext'
        optional: true
        presence_only: true
      - element: keep_lines
        tag: 'w:keepLines'
        optional: true
        presence_only: true
      - element: page_break_before
        tag: 'w:pageBreakBefore'
        optional: true
        presence_only: true
      - element: outline_level
        tag: 'w:outlineLvl'
        optional: true
        attributes:
          - name: val
            type: integer
    attributes: []

  # Run element with complete schema
  run:
    tag: 'w:r'
    description: "Text run - inline text with formatting"
    children:
      - element: run_properties
        tag: 'w:rPr'
        optional: true
      - element: text_element
        tag: 'w:t'
        optional: true
        attributes:
          - name: space
            namespace: 'http://www.w3.org/XML/1998/namespace'
            prefix: 'xml'
            type: enum
            values: [preserve, default]
      - element: tab
        tag: 'w:tab'
        optional: true
      - element: break
        tag: 'w:br'
        optional: true
        attributes:
          - name: type
            type: enum
            values: [page, column, textWrapping]
      - element: drawing
        tag: 'w:drawing'
        optional: true
      - element: pict
        tag: 'w:pict'
        optional: true
      - element: field_char
        tag: 'w:fldChar'
        optional: true
      - element: instr_text
        tag: 'w:instrText'
        optional: true
    attributes: []

  # Run properties with complete attribute list
  runproperties:
    tag: 'w:rPr'
    description: "Run (character) formatting properties"
    children:
      - element: style
        tag: 'w:rStyle'
        optional: true
        attributes:
          - name: val
            type: string
            required: true
      - element: bold
        tag: 'w:b'
        optional: true
        presence_only: true
      - element: italic
        tag: 'w:i'
        optional: true
        presence_only: true
      - element: underline
        tag: 'w:u'
        optional: true
        attributes:
          - name: val
            type: enum
            values: [single, double, thick, dotted, dashed, dotDash, dotDotDash, wave, wavyDouble, wavyHeavy, words, none]
      - element: strike
        tag: 'w:strike'
        optional: true
        presence_only: true
      - element: double_strike
        tag: 'w:dstrike'
        optional: true
        presence_only: true
      - element: small_caps
        tag: 'w:smallCaps'
        optional: true
        presence_only: true
      - element: all_caps
        tag: 'w:caps'
        optional: true
        presence_only: true
      - element: size
        tag: 'w:sz'
        optional: true
        attributes:
          - name: val
            type: integer
            required: true
      - element: font
        tag: 'w:rFonts'
        optional: true
        attributes:
          - name: ascii
            type: string
          - name: hAnsi
            type: string
          - name: cs
            type: string
          - name: eastAsia
            type: string
      - element: color
        tag: 'w:color'
        optional: true
        attributes:
          - name: val
            type: string
            required: true
      - element: highlight
        tag: 'w:highlight'
        optional: true
        attributes:
          - name: val
            type: enum
            values: [black, blue, cyan, green, magenta, red, yellow, white, darkBlue, darkCyan, darkGreen, darkMagenta, darkRed, darkYellow, darkGray, lightGray, none]
      - element: vertical_align
        tag: 'w:vertAlign'
        optional: true
        attributes:
          - name: val
            type: enum
            values: [baseline, superscript, subscript]
    attributes: []

  # Text element (simple text content)
  textelement:
    tag: 'w:t'
    description: "Text content element"
    children: []
    attributes:
      - name: space
        namespace: 'http://www.w3.org/XML/1998/namespace'
        prefix: 'xml'
        type: enum
        values: [preserve, default]

  # Table element
  table:
    tag: 'w:tbl'
    description: "Table - block-level element"
    children:
      - element: table_properties
        tag: 'w:tblPr'
        optional: true
      - element: table_grid
        tag: 'w:tblGrid'
        optional: true
      - element: table_row
        tag: 'w:tr'
        multiple: true
        optional: true
    attributes: []

  tableproperties:
    tag: 'w:tblPr'
    description: "Table formatting properties"
    children:
      - element: table_style
        tag: 'w:tblStyle'
        optional: true
        attributes:
          - name: val
            type: string
      - element: table_width
        tag: 'w:tblW'
        optional: true
        attributes:
          - name: w
            type: integer
          - name: type
            type: enum
            values: [auto, dxa, nil, pct]
      - element: table_alignment
        tag: 'w:jc'
        optional: true
        attributes:
          - name: val
            type: enum
            values: [left, right, center]
      - element: table_borders
        tag: 'w:tblBorders'
        optional: true
      - element: table_cell_spacing
        tag: 'w:tblCellSpacing'
        optional: true
        attributes:
          - name: w
            type: integer
          - name: type
            type: string
      - element: table_indent
        tag: 'w:tblInd'
        optional: true
        attributes:
          - name: w
            type: integer
          - name: type
            type: string
      - element: table_layout
        tag: 'w:tblLayout'
        optional: true
        attributes:
          - name: type
            type: enum
            values: [auto, fixed]
    attributes: []

  tablerow:
    tag: 'w:tr'
    description: "Table row"
    children:
      - element: table_row_properties
        tag: 'w:trPr'
        optional: true
      - element: table_cell
        tag: 'w:tc'
        multiple: true
    attributes: []

  tablerowproperties:
    tag: 'w:trPr'
    children:
      - element: row_height
        tag: 'w:trHeight'
        optional: true
        attributes:
          - name: val
            type: integer
          - name: hRule
            type: enum
            values: [auto, exact, atLeast]
      - element: table_header
        tag: 'w:tblHeader'
        optional: true
        presence_only: true
    attributes: []

  tablecell:
    tag: 'w:tc'
    description: "Table cell"
    children:
      - element: table_cell_properties
        tag: 'w:tcPr'
        optional: true
      - element: paragraph
        tag: 'w:p'
        multiple: true
    attributes: []

  tablecellproperties:
    tag: 'w:tcPr'
    children:
      - element: cell_width
        tag: 'w:tcW'
        optional: true
        attributes:
          - name: w
            type: integer
          - name: type
            type: enum
            values: [auto, dxa, nil, pct]
      - element: grid_span
        tag: 'w:gridSpan'
        optional: true
        attributes:
          - name: val
            type: integer
      - element: vertical_merge
        tag: 'w:vMerge'
        optional: true
        attributes:
          - name: val
            type: enum
            values: [restart, continue]
      - element: vertical_align
        tag: 'w:vAlign'
        optional: true
        attributes:
          - name: val
            type: enum
            values: [top, center, bottom]
      - element: shading
        tag: 'w:shd'
        optional: true
        attributes:
          - name: fill
            type: string
          - name: val
            type: enum
            values: [clear, solid]
    attributes: []

  # Hyperlink element
  hyperlink:
    tag: 'w:hyperlink'
    description: "Hyperlink element"
    children:
      - element: run
        tag: 'w:r'
        multiple: true
    attributes:
      - name: id
        namespace: 'http://schemas.openxmlformats.org/officeDocument/2006/relationships'
        prefix: 'r'
        type: string
      - name: anchor
        type: string
      - name: tooltip
        type: string

  # Image/Drawing element (simplified - actual DrawingML is complex)
  image:
    tag: 'w:drawing'
    description: "Image/Drawing element (inline or floating)"
    children: []
    attributes:
      - name: relationship_id
        type: string
      - name: width
        type: integer
      - name: height
        type: integer
      - name: alt_text
        type: string
      - name: title
        type: string

  # Comment element
  comment:
    tag: 'w:comment'
    description: "Comment element"
    children:
      - element: paragraph
        tag: 'w:p'
        multiple: true
    attributes:
      - name: id
        property: comment_id
        type: string
        required: true
      - name: author
        type: string
      - name: date
        type: string
      - name: initials
        type: string

# Schema metadata
metadata:
  total_elements: 37  # Core elements defined
  coverage: "Core document structure"
  reference: "ISO/IEC 29500-1:2016"

# Notes:
# - This is a starter schema covering core elements
# - Full schema would include 200+ elements
# - Each element fully defined with children and attributes
# - Schema is machine-readable for validation
# - Can be extended without code changes