# Jekyll configuration for Uniword documentation
# Uses Just the Docs theme - https://just-the-docs.com/

# Site settings
title: Uniword Documentation
description: Ruby library for reading, writing, and manipulating OOXML (DOCX) documents
url: https://metanorma.github.io
baseurl: /uniword

# Repository
repository: metanorma/uniword

# Theme
theme: just-the-docs
remote_theme: just-the-docs/just-the-docs@v0.7.0
color_scheme: light

# AsciiDoc support
asciidoc: {}
asciidoctor:
  attributes:
    idprefix: ''
    idseparator: '-'
    source-highlighter: rouge
    icons: font
    experimental: true
    sectanchors: true
    linkattrs: true
    sectnums: true
    toc: left
    toclevels: 3

# Search configuration
search_enabled: true
search:
  heading_level: 3
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: true

# Navigation
nav_sort: case_insensitive
nav_fold: true

# External links
aux_links:
  "Source":
    - "https://github.com/metanorma/uniword"
  "Report Issues":
    - "https://github.com/metanorma/uniword/issues"
  "RubyGem":
    - "https://rubygems.org/gems/uniword"

aux_links_new_tab: true

# Back to top
back_to_top: true
back_to_top_text: "Back to top"

# Heading anchors
heading_anchors: true

# Footer
footer_content: 'Copyright &copy; 2025 Ribose. Distributed under the <a href="https://github.com/metanorma/uniword/blob/main/LICENSE.txt">BSD 2-Clause License</a>.'

# Footer last edit timestamp
last_edit_timestamp: true
last_edit_time_format: "%b %e %Y at %I:%M %p"

# Enable code copy button
enable_copy_code_button: true

# Callouts
callouts_level: quiet
callouts:
  highlight:
    color: yellow
  important:
    title: Important
    color: blue
  new:
    title: New
    color: green
  note:
    title: Note
    color: purple
  warning:
    title: Warning
    color: red

# Plugins
plugins:
  - jekyll-asciidoc
  - jekyll-seo-tag
  - jekyll-sitemap

# Markdown settings (for any markdown files)
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge

# Collections for organizing content
collections:
  getting-started:
    permalink: "/:collection/:path/"
    output: true

  interfaces:
    permalink: "/:collection/:path/"
    output: true

  guides:
    permalink: "/:collection/:path/"
    output: true

  understanding:
    permalink: "/:collection/:path/"
    output: true

  features:
    permalink: "/:collection/:path/"
    output: true

  verification:
    permalink: "/:collection/:path/"
    output: true

  advanced:
    permalink: "/:collection/:path/"
    output: true

  development:
    permalink: "/:collection/:path/"
    output: true

# Just the Docs collection configuration
just_the_docs:
  collections:
    getting-started:
      name: Getting Started
      nav_fold: false
    interfaces:
      name: Interfaces
      nav_fold: true
    guides:
      name: Guides
      nav_fold: true
    understanding:
      name: Understanding
      nav_fold: true
    features:
      name: Features
      nav_fold: true
    verification:
      name: Verification
      nav_fold: true
    advanced:
      name: Advanced
      nav_fold: true
    development:
      name: Development
      nav_fold: true

# Defaults
defaults:
  - scope:
      path: ""
      type: getting-started
    values:
      layout: default
  - scope:
      path: ""
      type: interfaces
    values:
      layout: default
  - scope:
      path: ""
      type: guides
    values:
      layout: default
  - scope:
      path: ""
      type: understanding
    values:
      layout: default
  - scope:
      path: ""
      type: features
    values:
      layout: default
  - scope:
      path: ""
      type: verification
    values:
      layout: default
  - scope:
      path: ""
      type: advanced
    values:
      layout: default
  - scope:
      path: ""
      type: development
    values:
      layout: default

# Include additional files
include:
  - "*.adoc"

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .sass-cache
  - .jekyll-cache
  - .bundle
  - README.md
  - LICENSE
  - .git
  - .gitignore

permalink: pretty
